<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOOTH BUDDY</title>
<style>
  :root{--bg:#0f1115;--panel:#181b22;--panel2:#21252e;--line:#2c313c;--text:#e8eaed;--sub:#9aa3b2;--accent:#ff7a18;--me:#2b5cff;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic",Segoe UI,Roboto,Meiryo,sans-serif;
       background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
  header{padding:12px 16px;background:linear-gradient(135deg,#1a1d24,#12141a);border-bottom:1px solid var(--line);}
  header h1{margin:0;font-size:17px;letter-spacing:.5px;}
  header h1 span{color:var(--accent);}
  header p{margin:2px 0 0;font-size:11px;color:var(--sub);}
  .chars{display:flex;gap:8px;padding:10px 12px;overflow-x:auto;background:var(--panel);border-bottom:1px solid var(--line);}
  .char{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:6px 4px;border-radius:12px;width:80px;opacity:.55;transition:.15s;}
  .char.active{opacity:1;background:var(--panel2);box-shadow:0 0 0 1px var(--line);}
  .avatar{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;font-weight:700;}
  .char small{font-size:10.5px;color:var(--sub);text-align:center;line-height:1.2;}
  .char.active small{color:var(--text);}
  #chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
  .row{display:flex;gap:8px;max-width:88%;}
  .row.me{align-self:flex-end;flex-direction:row-reverse;}
  .bubavatar{width:32px;height:32px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;font-weight:700;}
  .bubble{padding:10px 13px;border-radius:14px;font-size:14.5px;line-height:1.5;background:var(--panel2);white-space:pre-line;}
  .row.me .bubble{background:var(--me);color:#fff;}
  .name{font-size:11px;color:var(--sub);margin:0 4px 3px;}
  .typing .bubble{color:var(--sub);font-style:italic;}
  footer{padding:10px 12px;background:var(--panel);border-top:1px solid var(--line);}
  .controls{display:flex;align-items:center;gap:8px;}
  #text{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:22px;padding:11px 15px;font-size:15px;outline:none;}
  button{border:none;cursor:pointer;font-family:inherit;}
  .iconbtn{width:44px;height:44px;border-radius:50%;background:var(--panel2);color:var(--text);font-size:19px;display:flex;align-items:center;justify-content:center;border:1px solid var(--line);}
  #mic.listening{background:var(--accent);color:#fff;animation:pulse 1s infinite;}
  #send{background:var(--accent);color:#fff;}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
  .toggles{display:flex;gap:14px;margin-top:8px;font-size:12px;color:var(--sub);align-items:center;flex-wrap:wrap;}
  .toggles label{display:flex;align-items:center;gap:5px;cursor:pointer;}
  select{background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:3px 6px;font-family:inherit;}
  .hint{font-size:11px;color:var(--sub);margin-top:6px;line-height:1.4;}
</style>
</head>
<body>
<header>
  <h1>BOOTH <span>BUDDY</span></h1>
  <p>板金・塗装の相棒 ｜ Claude API + RAG (local)</p>
</header>

<div class="chars" id="charbar"></div>
<div id="chat"></div>

<footer>
  <div class="controls">
    <button class="iconbtn" id="mic" title="音声で話す">🎤</button>
    <input id="text" placeholder="メッセージ、または🎤で話す…" autocomplete="off">
    <button class="iconbtn" id="send" title="送信">➤</button>
  </div>
  <div class="toggles">
    <label><input type="checkbox" id="voiceOut" checked> 音声で返事</label>
    <label>言語
      <select id="lang">
        <option value="ja-JP">日本語</option>
        <option value="en-US">English</option>
      </select>
    </label>
    <span id="status">— 待機中</span>
  </div>
  <div class="hint">返答はローカルのサーバー経由でClaude APIが生成し、knowledge/のMDをRAGで参照します。マイクはChrome/Edge推奨。</div>
</footer>

<script>
const CHARS = {
  boss:{name:"親方 / The Boss",face:"B",color:"#b5651d",rate:0.95,pitch:0.7,
        greet:"おう、来たか。困りごとでもあんのか？　遠慮なく聞けや。"},
  color:{name:"調色 / Color Pro",face:"C",color:"#3a7bd5",rate:1.0,pitch:1.0,
        greet:"こんにちは。色や塗装のことなら任せてください。どの工程の話を？"},
  tech:{name:"技術相棒 / Tech",face:"技",color:"#3aa17e",rate:1.05,pitch:1.0,
        greet:"うっす！技術のことなら任せて！新しい工具でもADASでも、一緒に攻略しよう！"},
  rinka:{name:"りんか / Rinka",face:"り",color:"#e0457b",rate:1.12,pitch:1.35,
        greet:"やっほー！りんかだよ〜✨ お疲れさま！なんでも気軽に話しかけてね🙌"},
};
let current = "boss";
let history = []; // {role, content}
let appPassword = ""; // 社内共有用の合言葉（必要な場合のみ使う）

// 起動時：サーバーが合言葉を要求するか確認し、必要なら一度だけ尋ねる。
async function ensurePassword(){
  try{
    const r = await fetch("/config");
    const cfg = await r.json();
    if(cfg && cfg.passwordRequired){
      while(!appPassword){
        appPassword = (window.prompt("合言葉を入力してください（社内共有用）") || "").trim();
      }
    }
  }catch(e){ /* /config が無い古い構成でも動くよう無視 */ }
}

const chat=document.getElementById("chat");
const charbar=document.getElementById("charbar");
const input=document.getElementById("text");
const statusEl=document.getElementById("status");

function buildCharBar(){
  charbar.innerHTML="";
  Object.entries(CHARS).forEach(([id,c])=>{
    const el=document.createElement("div");
    el.className="char"+(id===current?" active":"");
    el.innerHTML=`<div class="avatar" style="background:${c.color}">${c.face}</div><small>${c.name}</small>`;
    el.onclick=()=>switchChar(id);
    charbar.appendChild(el);
  });
}
function addBubble(text,who){
  const row=document.createElement("div");
  row.className="row "+(who==="me"?"me":"");
  if(who!=="me"){
    const c=CHARS[current];
    row.innerHTML=`<div class="bubavatar" style="background:${c.color}">${c.face}</div>
      <div><div class="name">${c.name}</div><div class="bubble"></div></div>`;
    row.querySelector(".bubble").textContent=text;
  }else{
    row.innerHTML=`<div class="bubble"></div>`;
    row.querySelector(".bubble").textContent=text;
  }
  chat.appendChild(row);
  chat.scrollTop=chat.scrollHeight;
  return row;
}
function switchChar(id){
  if(id===current) return;
  current=id; buildCharBar();
  const div=addBubble(`— ${CHARS[id].name} に切り替えました —`,"");
  div.querySelector(".bubble").style.cssText="background:transparent;color:var(--sub);font-size:12px;";
  div.querySelector(".bubavatar").style.visibility="hidden";
  div.querySelector(".name").style.display="none";
  const g=addBubble(CHARS[id].greet,"");
  if(document.getElementById("voiceOut").checked) speak(CHARS[id].greet);
}

async function send(){
  const v=input.value.trim();
  if(!v) return;
  addBubble(v,"me");
  input.value="";
  const row=addBubble("…","");
  row.querySelector(".bubble").parentElement.classList.add("typing");
  row.querySelector(".bubble").textContent="入力中…";
  try{
    const res=await fetch("/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-app-password":appPassword},
      body:JSON.stringify({message:v,character:current,history,password:appPassword})
    });
    if(res.status===401){
      appPassword="";                    // 合言葉が違うので入れ直し
      await ensurePassword();
      row.querySelector(".bubble").parentElement.classList.remove("typing");
      row.querySelector(".bubble").textContent="(合言葉が違いました。もう一度送信してください)";
      return;
    }
    const data=await res.json();
    const reply=data.reply || ("(エラー: "+(data.error||"no reply")+(data.detail?(" — "+data.detail):"")+")");
    row.querySelector(".bubble").parentElement.classList.remove("typing");
    row.querySelector(".bubble").textContent=reply;
    chat.scrollTop=chat.scrollHeight;
    history.push({role:"user",content:v});
    history.push({role:"assistant",content:reply});
    if(data.reply && document.getElementById("voiceOut").checked) speak(reply);
  }catch(e){
    row.querySelector(".bubble").parentElement.classList.remove("typing");
    row.querySelector(".bubble").textContent="(接続エラー: サーバーが起動しているか確認してください)";
  }
}
document.getElementById("send").onclick=send;
input.addEventListener("keydown",e=>{if(e.key==="Enter")send();});

/* ---- TTS ---- */
function speak(text){
  if(!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text.replace(/\n/g," "));
  const c=CHARS[current];
  const lang=document.getElementById("lang").value;
  const vs=speechSynthesis.getVoices();
  const v=vs.find(x=>x.lang && x.lang.startsWith(lang.slice(0,2)));
  if(v) u.voice=v;
  u.lang=lang; u.rate=c.rate; u.pitch=c.pitch;
  speechSynthesis.speak(u);
}
if("speechSynthesis" in window){ speechSynthesis.onvoiceschanged=()=>{}; }

/* ---- STT ---- */
const micBtn=document.getElementById("mic");
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
let rec=null,listening=false;
if(SR){
  rec=new SR(); rec.interimResults=false; rec.maxAlternatives=1;
  rec.onresult=e=>{ input.value=e.results[0][0].transcript; send(); };
  rec.onend=()=>{ listening=false; micBtn.classList.remove("listening"); statusEl.textContent="— 待機中"; };
  rec.onerror=e=>{ statusEl.textContent="マイクエラー: "+e.error; };
  micBtn.onclick=()=>{
    if(listening){ rec.stop(); return; }
    rec.lang=document.getElementById("lang").value;
    try{ rec.start(); listening=true; micBtn.classList.add("listening"); statusEl.textContent="🎤 聞いています…"; }
    catch(err){ statusEl.textContent="開始できませんでした"; }
  };
}else{
  micBtn.onclick=()=>{ statusEl.textContent="このブラウザは音声入力に未対応（Chrome/Edge推奨）"; };
}

/* ---- init ---- */
buildCharBar();
addBubble(CHARS[current].greet,"");
ensurePassword(); // サーバーが合言葉を要求する設定なら、起動時に尋ねる
</script>
</body>
</html>
